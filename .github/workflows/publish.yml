name: Publish
# Manual publish workflow — triggers after CI passes

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to confirm"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  validate-input:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: inputs.confirm != 'publish'
        run: |
          echo "::error::You must type 'publish' to confirm. Got: '${{ inputs.confirm }}'"
          exit 1

  ci:
    name: CI
    needs: validate-input
    uses: ./.github/workflows/ci.yml

  publish-crates:
    name: Publish Crates
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish theta-macros
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        working-directory: theta-macros

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Publish theta
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        working-directory: theta

  publish-npm:
    name: Publish npm Packages
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: theta-ts/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: theta-ts
      - run: pnpm -r build
        working-directory: theta-ts

      - name: Publish theta-ts
        run: npm publish --tag alpha --access public
        working-directory: theta-ts/ts/theta-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish vite-plugin-theta
        run: npm publish --tag alpha --access public
        working-directory: theta-ts/ts/vite-plugin-theta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  tag:
    name: Create GitHub Release
    needs: [publish-crates, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' theta/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "## Release v${VERSION}

Crates published to crates.io:
- \`theta-macros@${VERSION}\`
- \`theta@${VERSION}\`

npm packages published (tag: \`alpha\`):
- \`theta-ts@${VERSION}\`
- \`vite-plugin-theta@${VERSION}\`" \
            --prerelease
