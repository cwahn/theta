name: Publish Resume (alpha.51 theta-ts)
# One-off: publish theta-ts and create the release after the main publish workflow
# partially failed. Delete this file after use.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to confirm"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  publish-theta-ts:
    name: Publish theta-ts Crate
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: inputs.confirm != 'publish'
        run: |
          echo "::error::Confirmation required. Got: '${{ inputs.confirm }}'"
          exit 1

      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish theta-ts
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        working-directory: theta-ts

  release:
    name: Create GitHub Release
    needs: publish-theta-ts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' theta/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES="$(printf "## Release v%s\n\nCrates published to crates.io:\n- \`theta-macros@%s\`\n- \`theta@%s\`\n- \`theta-ts@%s\`\n\nnpm packages published (tag: \`alpha\`):\n- \`theta-ts@%s\`\n- \`vite-plugin-theta@%s\`" "$VERSION" "$VERSION" "$VERSION" "$VERSION" "$VERSION" "$VERSION")"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$NOTES" \
            --prerelease
