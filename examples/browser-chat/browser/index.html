<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theta Browser Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; height: 100vh; }
        header { background: #16213e; padding: 1rem; text-align: center; }
        header h1 { font-size: 1.3rem; color: #e94560; }
        #connect-panel { padding: 1rem; display: flex; gap: 0.5rem; background: #0f3460; }
        #connect-panel input { flex: 1; padding: 0.5rem; border: 1px solid #555; border-radius: 4px; background: #1a1a2e; color: #eee; font-size: 0.9rem; }
        #connect-panel button { padding: 0.5rem 1rem; border: none; border-radius: 4px; background: #e94560; color: #fff; cursor: pointer; font-weight: bold; }
        #connect-panel button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { padding: 0.5rem 1rem; background: #16213e; font-size: 0.85rem; color: #aaa; }
        #messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .message { background: #16213e; padding: 0.6rem 1rem; border-radius: 8px; max-width: 80%; }
        .message .author { color: #e94560; font-weight: bold; font-size: 0.85rem; }
        .message .text { margin-top: 0.2rem; }
        .message .time { font-size: 0.75rem; color: #666; margin-top: 0.2rem; }
        #chat-input { padding: 1rem; display: flex; gap: 0.5rem; background: #0f3460; }
        #chat-input input { flex: 1; padding: 0.5rem; border: 1px solid #555; border-radius: 4px; background: #1a1a2e; color: #eee; }
        #chat-input button { padding: 0.5rem 1rem; border: none; border-radius: 4px; background: #e94560; color: #fff; cursor: pointer; font-weight: bold; }
        #chat-input.hidden { display: none; }
    </style>
</head>
<body>
    <header><h1>Theta Browser Chat</h1></header>

    <div id="connect-panel">
        <input type="text" id="author-input" placeholder="Your name" />
        <input type="text" id="key-input" placeholder="Server public key" />
        <button id="connect-btn" onclick="doConnect()">Connect</button>
    </div>
    <div id="status">Not connected</div>
    <div id="messages"></div>
    <div id="chat-input" class="hidden">
        <input type="text" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')doSend()" />
        <button onclick="doSend()">Send</button>
    </div>

    <script type="module">
        import init, { connect, send_message, start_monitoring } from './pkg/browser_chat_browser.js';

        let wasm;
        let author = '';

        async function initWasm() {
            wasm = await init();
            document.getElementById('status').textContent = 'WASM loaded. Enter server key to connect.';
        }

        window.doConnect = async function () {
            const key = document.getElementById('key-input').value.trim();
            author = document.getElementById('author-input').value.trim() || 'anon';
            if (!key) return;

            const btn = document.getElementById('connect-btn');
            btn.disabled = true;
            document.getElementById('status').textContent = 'Connecting...';

            try {
                await connect(key);
                document.getElementById('status').textContent = 'Connected! Monitoring state...';
                document.getElementById('chat-input').classList.remove('hidden');
                document.getElementById('connect-panel').style.display = 'none';

                await start_monitoring((stateJson) => {
                    const messages = JSON.parse(stateJson);
                    renderMessages(messages);
                });
            } catch (e) {
                document.getElementById('status').textContent = 'Error: ' + e;
                btn.disabled = false;
            }
        };

        window.doSend = async function () {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            try {
                await send_message(author, text);
            } catch (e) {
                document.getElementById('status').textContent = 'Send error: ' + e;
            }
        };

        function renderMessages(messages) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            for (const msg of messages) {
                const div = document.createElement('div');
                div.className = 'message';
                const date = new Date(msg.timestamp * 1000);
                div.innerHTML = `
                    <div class="author">${escape(msg.author)}</div>
                    <div class="text">${escape(msg.text)}</div>
                    <div class="time">${date.toLocaleTimeString()}</div>
                `;
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        }

        function escape(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        initWasm();
    </script>
</body>
</html>
