<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theta Web Chat — Generated API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(217.2, 32.6%, 17.5%)',
                        input: 'hsl(217.2, 32.6%, 17.5%)',
                        ring: 'hsl(224.3, 76.3%, 48%)',
                        bg: 'hsl(222.2, 84%, 4.9%)',
                        fg: 'hsl(210, 40%, 98%)',
                        primary: 'hsl(217.2, 91.2%, 59.8%)',
                        'primary-fg': 'hsl(222.2, 47.4%, 11.2%)',
                        secondary: 'hsl(217.2, 32.6%, 17.5%)',
                        muted: 'hsl(215, 20.2%, 65.1%)',
                        card: 'hsl(224, 71%, 8%)',
                    },
                }
            }
        };
    </script>
</head>
<body class="bg-bg text-fg min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="border-b border-border px-6 py-4">
        <h1 class="text-xl font-semibold tracking-tight">Theta Web Chat</h1>
        <p class="text-sm text-muted">Built entirely on the macro-generated actor API</p>
    </header>

    <!-- Landing: Create or Join -->
    <div id="landing" class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-md space-y-6">
            <div class="space-y-2 text-center">
                <h2 class="text-2xl font-semibold tracking-tight">Get Started</h2>
                <p class="text-sm text-muted">Create a new room or join an existing one</p>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="text-sm font-medium leading-none mb-1.5 block">Your Name</label>
                    <input id="name-input" class="flex h-10 w-full rounded-md border border-input bg-bg px-3 py-2 text-sm placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-ring" placeholder="Enter your name" />
                </div>
            </div>

            <div class="rounded-lg border border-border bg-card p-6 space-y-4">
                <div class="space-y-1">
                    <h3 class="font-medium">Create Room</h3>
                    <p class="text-sm text-muted">Host a chat room on this browser</p>
                </div>
                <button id="create-btn" class="inline-flex items-center justify-center w-full h-10 px-4 rounded-md text-sm font-medium bg-primary text-primary-fg hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed" onclick="doCreate()">Create Room</button>
            </div>

            <div class="relative">
                <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-border"></span></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-bg px-2 text-muted">or</span></div>
            </div>

            <div class="rounded-lg border border-border bg-card p-6 space-y-4">
                <div class="space-y-1">
                    <h3 class="font-medium">Join Room</h3>
                    <p class="text-sm text-muted">Connect to someone else's room</p>
                </div>
                <input id="key-input" class="flex h-10 w-full rounded-md border border-input bg-bg px-3 py-2 text-sm placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-ring" placeholder="Paste host's public key" />
                <button id="join-btn" class="inline-flex items-center justify-center w-full h-10 px-4 rounded-md text-sm font-medium bg-secondary text-fg hover:opacity-80 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed" onclick="doJoin()">Join Room</button>
            </div>

            <p id="status" class="text-sm text-muted text-center">Loading WASM...</p>
        </div>
    </div>

    <!-- Chat UI (hidden initially) -->
    <div id="chat-ui" class="flex-1 flex-col hidden" style="display:none;">
        <div class="border-b border-border px-6 py-3 flex items-center justify-between">
            <div>
                <span id="room-role" class="text-sm font-medium"></span>
                <span id="room-key" class="text-xs text-muted ml-2 font-mono cursor-pointer hover:text-fg transition-colors" title="Click to copy" onclick="copyKey()"></span>
            </div>
            <span class="text-xs text-muted" id="chat-status"></span>
        </div>

        <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-3"></div>

        <div class="border-t border-border p-4 flex gap-3">
            <input id="msg-input" class="flex h-10 flex-1 rounded-md border border-input bg-bg px-3 py-2 text-sm placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-ring" placeholder="Type a message..." onkeydown="if(event.key==='Enter')doSend()" />
            <button class="inline-flex items-center justify-center h-10 px-4 rounded-md text-sm font-medium bg-primary text-primary-fg hover:opacity-90 transition-opacity" onclick="doSend()">Send</button>
        </div>
    </div>

    <script type="module">
        // ---- All app logic in JS, calling macro-generated WASM API ----
        import init, {
            initThetaRemote,
            publicKey,
            spawnChatRoom,
            bindChatRoom,
            lookupChatRoom,
        } from './pkg/web_chat_browser.js';

        let author = '';
        let chatHandle = null;
        let myPublicKey = '';

        async function initWasm() {
            await init();
            document.getElementById('status').textContent = 'Initializing network...';

            myPublicKey = await initThetaRemote();
            document.getElementById('status').textContent = 'Ready. Your key: ' + myPublicKey.slice(0, 12) + '...';
        }

        window.doCreate = async function () {
            author = document.getElementById('name-input').value.trim() || 'Host';
            const btn = document.getElementById('create-btn');
            btn.disabled = true;
            btn.textContent = 'Creating...';
            document.getElementById('status').textContent = 'Creating room...';

            try {
                // Spawn a ChatRoom actor using the generated API
                chatHandle = spawnChatRoom({ messages: [] });

                // Bind it so remote peers can discover it as "chat"
                bindChatRoom("chat", chatHandle);

                showChat('Hosting', myPublicKey);
                await startMonitoring();
            } catch (e) {
                document.getElementById('status').textContent = 'Error: ' + e;
                btn.disabled = false;
                btn.textContent = 'Create Room';
            }
        };

        window.doJoin = async function () {
            const key = document.getElementById('key-input').value.trim();
            if (!key) return;
            author = document.getElementById('name-input').value.trim() || 'Guest';
            const btn = document.getElementById('join-btn');
            btn.disabled = true;
            btn.textContent = 'Joining...';
            document.getElementById('status').textContent = 'Connecting to host...';

            try {
                // Look up the remote ChatRoom actor using the generated API
                const url = 'iroh://chat@' + key;
                chatHandle = await lookupChatRoom(url);

                showChat('Connected to', key.slice(0, 12) + '...');
                await startMonitoring();
            } catch (e) {
                document.getElementById('status').textContent = 'Error: ' + e;
                btn.disabled = false;
                btn.textContent = 'Join Room';
            }
        };

        function showChat(role, keyDisplay) {
            document.getElementById('landing').style.display = 'none';
            const chatUI = document.getElementById('chat-ui');
            chatUI.style.display = 'flex';
            chatUI.classList.remove('hidden');
            document.getElementById('room-role').textContent = role;
            document.getElementById('room-key').textContent = keyDisplay;
            document.getElementById('chat-status').textContent = 'Monitoring...';
            document.getElementById('msg-input').focus();
        }

        async function startMonitoring() {
            // Use the generated initStream to get reactive state updates
            await chatHandle.initStream((state) => {
                renderMessages(state);
            });
        }

        window.doSend = function () {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            try {
                // Use the generated tell() with externally-tagged serde message
                chatHandle.tell({ SendMessage: { author: author, text: text } });
            } catch (e) {
                document.getElementById('chat-status').textContent = 'Send error: ' + e;
            }
        };

        window.copyKey = function () {
            const key = document.getElementById('room-key').textContent;
            navigator.clipboard.writeText(key).then(() => {
                const el = document.getElementById('room-key');
                const orig = el.textContent;
                el.textContent = 'Copied!';
                setTimeout(() => el.textContent = orig, 1500);
            });
        };

        function renderMessages(messages) {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            for (const msg of messages) {
                const div = document.createElement('div');
                const isMe = msg.author === author;
                div.className = 'rounded-lg border border-border bg-card p-3 max-w-[80%] ' + (isMe ? 'ml-auto' : '');
                const date = new Date(msg.timestamp * 1000);
                div.innerHTML =
                    '<div class="flex items-baseline gap-2 mb-1">' +
                        '<span class="text-sm font-medium ' + (isMe ? 'text-primary' : 'text-muted') + '">' + esc(msg.author) + '</span>' +
                        '<span class="text-xs text-muted">' + date.toLocaleTimeString() + '</span>' +
                    '</div>' +
                    '<p class="text-sm">' + esc(msg.text) + '</p>';
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        initWasm();
    </script>
</body>
</html>
