name: Publish
# Manual publish — run on main after CI is green.
# Publishes theta-macros, theta to crates.io and
# theta-ts, vite-plugin-theta to npm, then creates a GitHub Release.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to confirm"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: inputs.confirm != 'publish'
        run: |
          echo "::error::Confirmation required. Got: '${{ inputs.confirm }}'"
          exit 1

  check-ci:
    name: Verify CI is Green
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check CI workflow passed on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking CI status for commit ${{ github.sha }}"
          PASSING=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${{ github.sha }}&status=completed&per_page=10" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")] | length')
          if [ "$PASSING" -lt 1 ]; then
            echo "::error::No successful CI run found for commit ${{ github.sha }}. Please ensure CI is green before publishing."
            exit 1
          fi
          echo "CI is green for this commit."

  publish-crates:
    name: Publish Crates
    needs: check-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish theta-macros
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        working-directory: theta-macros

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Publish theta
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        working-directory: theta

  publish-npm:
    name: Publish npm Packages
    needs: check-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: theta-ts/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: theta-ts
      - run: pnpm -r build
        working-directory: theta-ts

      - name: Publish theta-ts
        run: npm publish --tag alpha --access public
        working-directory: theta-ts/ts/theta-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish vite-plugin-theta
        run: npm publish --tag alpha --access public
        working-directory: theta-ts/ts/vite-plugin-theta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    needs: [publish-crates, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' theta/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES="$(printf "## Release v%s\n\nCrates published to crates.io:\n- \`theta-macros@%s\`\n- \`theta@%s\`\n\nnpm packages published (tag: \`alpha\`):\n- \`theta-ts@%s\`\n- \`vite-plugin-theta@%s\`" "$VERSION" "$VERSION" "$VERSION" "$VERSION" "$VERSION")"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$NOTES" \
            --prerelease
